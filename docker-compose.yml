version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: instagram-db
    environment:
      POSTGRES_DB: instagram
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  posts-api:
    build: post-service
    container_name: posts-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres