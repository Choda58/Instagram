<div class="auth-container">

  <div class="auth-card">

    <h2>Instagram</h2>

    <input
      type="text"
      placeholder="Username or email"
      [(ngModel)]="username"
      name="username"
    >

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
      name="password"
    >

    <button (click)="login()">Log in</button>

    <p class="switch">
      Don't have an account?
      <a routerLink="/register">Sign up</a>
    </p>

  </div>

</div>
