<div class="auth-container">

  <div class="auth-card">

    <h2>Instagram</h2>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username"
      name="username"
    >

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
      name="email"
    >

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
      name="password"
    >

    <button (click)="register()">Sign up</button>

    <p class="switch">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </div>

</div>
