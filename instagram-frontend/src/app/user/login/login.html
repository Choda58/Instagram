<div class="login-page">

  <div class="login-box">

    <h2 class="logo">Instagram</h2>

    <form (ngSubmit)="login()">

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
      >

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
      >

      <button type="submit">
        Log in
      </button>

    </form>

    <div class="login-link">
      Don't have an account?
      <a routerLink="/register">Sign up</a>
    </div>

  </div>

</div>
