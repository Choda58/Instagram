<div class="profile-container" *ngIf="user">

  <div class="profile-header">

    <img
      class="profile-avatar"
      [src]="userService.getProfileImage(user.id)"
      onerror="this.src='https://i.imgur.com/HeIi0wU.png'"
    >

    <div class="profile-info">

      <h2>{{user.username}}</h2>

      <div class="profile-stats">
        <span><b>{{posts.length}}</b> posts</span>
        <span><b>{{followersCount}}</b> followers</span>
        <span><b>{{followingCount}}</b> following</span>
      </div>

      <p class="profile-name">{{user.name}}</p>
      <p class="profile-bio">{{user.bio}}</p>

      <div *ngIf="userId !== loggedUserId">

        <button *ngIf="!isFollowingUser"
                (click)="follow()"
                class="follow-btn">
          Follow
        </button>

        <button *ngIf="isFollowingUser"
                (click)="unfollow()"
                class="unfollow-btn">
          Unfollow
        </button>

      </div>

    </div>

  </div>

  <hr>

  <div class="create-post">

    <h3>Create Post</h3>

    <textarea
      [(ngModel)]="description"
      name="description"
      placeholder="Write description..."
    ></textarea>

    <input
      type="file"
      multiple
      (change)="onFileSelected($event)"
    >

    <button type="button" (click)="createPost()">
      Create Post
    </button>

  </div>

  <hr>

  <h3>Posts</h3>

  <div class="posts-grid">

    <div *ngFor="let post of posts">

      <img
        *ngIf="post.media?.length"
        [src]="'http://localhost:8083/posts/media/' + post.media[0].url.split('/').pop()"
      >

    </div>

  </div>

</div>
