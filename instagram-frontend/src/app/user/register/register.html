<div class="register-page">

  <div class="register-box">

    <h2 class="logo">Instagram</h2>

    <form (ngSubmit)="register()">

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
      >

      <input
        type="text"
        placeholder="Name"
        [(ngModel)]="name"
        name="name"
      >

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
      >

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
      >

      <button type="submit">
        Sign up
      </button>

    </form>

    <p class="login-link">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>

  </div>

</div>
